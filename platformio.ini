; PlatformIO Project Configuration File
;
; LoRa868Stick - RF.Guru LoRa 868 MHz Communication Stick
; Converted from CircuitPython to Arduino C++ for RP2040
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
board_build.arduino.earlephilhower.usb_manufacturer = RF.Guru
board_build.arduino.earlephilhower.usb_product = LoRaStick
board_build.arduino.earlephilhower.usb_vid = 0x1209
board_build.arduino.earlephilhower.usb_pid = 0xFF42
lib_deps =
    sandeepmistry/LoRa
    rweather/Crypto
